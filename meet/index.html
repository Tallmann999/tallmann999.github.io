<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tallmann — Unity / C# Developer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #101018;
      color: #ffffff;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #181827;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .subtitle {
      margin: 10px 0 24px;
      color: #c8c8d8;
      line-height: 1.5;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .link {
      display: block;
      padding: 15px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .link:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: #aaaabb;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="../assets/images/logo.png" alt="Tallmann Logo" />

    <h1>Anton Varabov / Tallmann</h1>

    <p class="subtitle">
      Unity / C# Developer<br>
      Gameplay Systems · AI · UI · Tools · WebGL Demos
    </p>

    <div class="links">
      <a class="link" href="https://tallmann999.github.io/">Portfolio</a>
      <a class="link" href="https://tallmann.itch.io/">Playable Demos / Itch.io</a>
      <a class="link" href="https://github.com/Tallmann999">GitHub</a>
      <a class="link" href="https://t.me/TMGameDev">Telegram Devlog</a>
      <a class="link" href="https://t.me/Tallmann999">Contact Me</a>
    </div>

    <div class="footer">
      Building indie games, prototypes and gameplay systems in Unity.
    </div>
  </main>
</body>
</html>
