<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tallmann — Unity / C# Developer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070B1A;
      color: #F4F7FF;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #11162A;
      border: 1px solid #242B45;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.15), 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin-bottom: 16px;
      object-fit: cover;
      border: 1px solid rgba(124, 58, 237, 0.25);
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.25);
      background: rgba(255,255,255,0.02);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      color: #F4F7FF;
    }

    .subtitle {
      margin: 10px 0 24px;
      color: #AAB3D1;
      line-height: 1.5;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .link {
      display: block;
      padding: 15px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7C3AED, #EC4899);
      color: #F4F7FF;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      border: 1px solid rgba(124, 58, 237, 0.3);
    }

    .link:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.5), 0 0 40px rgba(34, 211, 238, 0.2);
      opacity: 1;
    }

    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: #AAB3D1;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="../assets/images/logo.png" alt="Tallmann Logo" />

    <h1>Anton Varabov / Tallmann</h1>

    <p class="subtitle">
      Unity / C# Developer<br>
      Gameplay Systems · AI · UI · Tools · WebGL Demos
    </p>

    <div class="links">
      <a class="link" href="https://tallmann999.github.io/">Portfolio</a>
      <a class="link" href="https://tallmann.itch.io/">Playable Demos / Itch.io</a>
      <a class="link" href="https://github.com/Tallmann999">GitHub</a>
      <a class="link" href="https://t.me/TMGameDev">Telegram Devlog</a>
      <a class="link" href="https://t.me/Tallmann999">Contact Me Telegram</a>
      <a class="link" href="tel:+79263762374">Contact Me Telephone</a>
    </div>

    <div class="footer">
      Building indie games, prototypes and gameplay systems in Unity.
    </div>
  </main>
</body>
